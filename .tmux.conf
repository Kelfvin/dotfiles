#------------------------------------------------------------
# Plugins
#------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu' 
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

#------------------------------------------------------------
# General
#------------------------------------------------------------
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g automatic-rename on
set -g extended-keys on
set -g extended-keys-format csi-u
set -s escape-time 0
set -g focus-events on
set -g display-time 4000

set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM TERM_PROGRAM"

#------------------------------------------------------------
# Theme Setting
#------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:clipboard"
set -as terminal-features ",*:sixel"
set -as terminal-features ",*:usstyle"
set -as terminal-features 'xterm*:extkeys'

set -g status-style 'bg=default,fg=#cdd6f4'
set-option -g status-position top

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100

# Clear status bar
set -g status-left "" 
set -g status-right ""


# 设置状态栏的右边要显示的信息
set -g status-right ' #{cpu_fg_color}CPU:#{cpu_percentage} #{?#{==:#{gpu_percentage},No GPU},,#{gpu_fg_color}GPU:#{gpu_percentage} }#{ram_fg_color}MEM:#{ram_percentage}'

set -g copy-mode-match-style 'fg=#1e1e2e,bg=#cdd6f4'
set -g copy-mode-current-match-style 'fg=#1e1e2e,bg=#d20f39'

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#f9e2af'
set -g pane-border-indicators both

set -g window-status-style 'fg=#585b70,bg=default'
set -g window-status-current-style 'fg=#f9e2af,bg=default'

# 窗口序号 → 图标映射（1-9 各自对应一个 nf-md 图标，超出范围 fallback 到 󰿩）
# 用 user option 封装映射，window-status-format 与 -current-format 通过 #{E:@window_icon}
# 二次展开复用，避免在两处重复 10 层嵌套的 #{?:} 三元。
set -g @window_icon '#{?#{==:#{window_index},1},󰬺 ,#{?#{==:#{window_index},2},󰬻 ,#{?#{==:#{window_index},3},󰬼 ,#{?#{==:#{window_index},4},󰬽 ,#{?#{==:#{window_index},5},󰬾 ,#{?#{==:#{window_index},6},󰬿 ,#{?#{==:#{window_index},7},󰭀 ,#{?#{==:#{window_index},8},󰭁 ,#{?#{==:#{window_index},9},󰭂 ,󰿩 }}}}}}}}}'

set -g window-status-format '#{E:@window_icon}#W#{?window_zoomed_flag, 󰁌 , }'
set -g window-status-current-format '#{E:@window_icon}#W#{?window_zoomed_flag, 󰁌 , }'


#------------------------------------------------------------
# Yazi Image Preview :https://yazi-rs.github.io/docs/image-preview/#tmux
#------------------------------------------------------------
set -g allow-passthrough on
# set -ga update-environment TERM
# set -ga update-environment TERM_PROGRAM


#------------------------------------------------------------
# Maximize pane
#------------------------------------------------------------
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# Reload config
unbind r
bind-key r source-file ~/.tmux.conf; display "Config reloaded"
# Split panes
unbind %
bind-key | split-window -h -c "#{pane_current_path}"

unbind '"'
bind-key - split-window -v -c "#{pane_current_path}"

# Resize tmux pane
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5

# maximize pane
bind -r m resize-pane -Z

# move window
bind-key -r H swap-window -t -1 \; select-window -t -1
bind-key -r L swap-window -t +1 \; select-window -t +1

#------------------------------------------------------------
# Visual mode(vi)
#------------------------------------------------------------
set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

bind-key -T copy-mode-vi C-f send-keys -X page-down
bind-key -T copy-mode-vi C-b send-keys -X page-up
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up

if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'
